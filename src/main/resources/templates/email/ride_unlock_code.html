<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Code de déverrouillage</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0b1f33; color: #e5ecf4; margin: 0; padding: 0; }
        .card { max-width: 560px; margin: 24px auto; background: linear-gradient(135deg, #132f4c 0%, #0f2338 100%); border-radius: 16px; padding: 24px; box-shadow: 0 18px 35px rgba(0,0,0,0.25); }
        .title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .code { font-size: 32px; letter-spacing: 2px; font-weight: 800; background: #f0b429; color: #0b1f33; padding: 12px 16px; display: inline-block; border-radius: 10px; }
        .meta { margin-top: 16px; line-height: 1.6; }
        .label { color: #9fb4c9; }
    </style>
</head>
<body>
<div class="card">
    <div class="title">Salut {{firstName}}, voici ton code pour déverrouiller une trottinette :</div>
    <div class="code">{{unlockCode}}</div>
    <div class="meta">
        <div><span class="label">Valide jusqu'à :</span> {{expiresAt}}</div>
        <div><span class="label">Semestre :</span> {{semester}}</div>
        <div><span class="label">Durée quotidienne :</span> {{dailyDuration}}</div>
    </div>
</div>
</body>
</html>
